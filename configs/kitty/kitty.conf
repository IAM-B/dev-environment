# ============================================
# Kitty Terminal Configuration
# Theme: Custom ThinkProd (migrated from Konsole)
# ============================================

# === Font (same as Konsole) ===
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# === Cursor - Smooth animation ===
cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0.5
cursor_stop_blinking_after 0
cursor_trail 3
cursor_trail_decay 0.1 0.4

# === Scrollback ===
scrollback_lines 10000

# === Window ===
window_padding_width  4
confirm_os_window_close 0
remember_window_size  yes
hide_window_decorations no

# === Transparency & Background (like Konsole: opacity 0.5 + blur) ===
background_opacity 0.5
background_blur    64

# === Dim inactive windows (like Konsole DimWhenInactive) ===
dim_opacity 0.71

# === Shell ===
shell /bin/bash

# === Performances ===
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# === URL ===
url_style        curly
detect_urls      yes
open_url_with    default

# === Sound ===
enable_audio_bell no

# === Useful shortcuts ===
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# === Tab navigation ===
map shift+right next_tab
map shift+left  previous_tab

# ============================================
# Color Scheme: ThinkProd (migrated from Konsole)
# Pure black background + bright green foreground
# ============================================

# Base
foreground            #55ff00
background            #000000
selection_foreground  #ffffff
selection_background  #44475a
url_color             #55ff7f

# Cursor (green on black)
cursor                #55ff00
cursor_text_color     #000000

# Tabs
active_tab_foreground   #000000
active_tab_background   #55ff00
active_tab_font_style   bold
inactive_tab_foreground #55ff00
inactive_tab_background #000000
inactive_tab_font_style normal

# Normal colors (from Konsole colorscheme)
color0  #000000
color1  #fa4b4b
color2  #18b218
color3  #b26818
color4  #bd93f9
color5  #e11ee1
color6  #18b2b2
color7  #b2b2b2

# Bright/Intense colors
color8  #686868
color9  #ff5454
color10 #54ff54
color11 #ffff54
color12 #d6acff
color13 #ff54ff
color14 #54ffff
color15 #ffffff

# Marks
mark1_foreground #000000
mark1_background #ff5555
