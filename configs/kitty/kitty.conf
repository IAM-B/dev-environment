# ============================================
# Kitty Terminal Configuration
# Theme: Custom ThinkProd (migrated from Konsole)
# ============================================

# === Font (same as Konsole) ===
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# === Cursor - Smooth animation ===
cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0.5
cursor_stop_blinking_after 0
cursor_trail 3
cursor_trail_decay 0.1 0.4

# === Scrollback ===
scrollback_lines 10000

# === Window ===
window_padding_width  4
confirm_os_window_close 0
remember_window_size  yes
hide_window_decorations no

# === Transparency & Background ===
background_opacity 1.0
background_blur    0

# === Dim inactive windows (like Konsole DimWhenInactive) ===
dim_opacity 0.71

# === Shell ===
shell /bin/bash --login

# === Remote control ===
allow_remote_control yes

# === Performances ===
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# === URL ===
url_style        curly
detect_urls      yes
open_url_with    default

# === Sound ===
enable_audio_bell no

# === Useful shortcuts ===
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# === Tab navigation ===
map shift+right next_tab
map shift+left  previous_tab

# ============================================
# Color Scheme: TokyoNight
# ============================================

# Base
foreground            #c0caf5
background            #1a1b26
selection_foreground  #c0caf5
selection_background  #364a82
url_color             #73daca

# Cursor
cursor                #c0caf5
cursor_text_color     #1a1b26

# Tabs
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
active_tab_font_style   bold
inactive_tab_foreground #545c7e
inactive_tab_background #1a1b26
inactive_tab_font_style normal

# Normal colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright colors
color8  #545c7e
color9  #ff899d
color10 #b5e890
color11 #ebc88d
color12 #8bb8ff
color13 #cdb0ff
color14 #97daff
color15 #dce0ff

# Marks
mark1_foreground #1a1b26
mark1_background #f7768e
