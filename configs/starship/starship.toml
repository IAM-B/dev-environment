## FIRST LINE/ROW: Info & Status
# First param â”€â”Œ
[username]
format = " [â•­â”€$user]($style)@"
style_user = "bold #7aa2f7"
style_root = "bold #f7768e"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) in "
style = "bold #bb9af7"
trim_at = "-"
ssh_only = false
disabled = false

# Third param
[directory]
style = "#7dcfff"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "repo: "

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "#e0af68"
ahead = "â‡¡${count}"
diverged = "â‡•â‡¡${ahead_count}â‡£${behind_count}"
behind = "â‡£${count}"
deleted = "x"

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "took [$duration]($style)"
style = "#e0af68"
disabled = false


## SECOND LINE/ROW: Prompt
# Somethere at the beginning
[battery]
full_symbol = " "
charging_symbol = " "
discharging_symbol = " "
disabled = true

[[battery.display]]
threshold = 15
style = "bold #f7768e"
disabled = true

[[battery.display]]
threshold = 50
style = "bold #e0af68"
disabled = true

[[battery.display]]
threshold = 80
style = "bold #9ece6a"
disabled = true

# Prompt: optional param 1
[time]
format = " ðŸ•™ $time($style)\n"
time_format = "%T"
style = "bright-white"
disabled = true

# Prompt: param 2 â””â”€
[character]
success_symbol = " [â•°â”€Î»](bold #7aa2f7)"
error_symbol = " [Ã—](bold #f7768e)"

# SYMBOLS
[status]
symbol = "ðŸ”´"
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

[aws]
symbol = "  "

[conda]
symbol = " "

[dart]
symbol = " "

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style = "#7aa2f7 bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

